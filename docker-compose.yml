# version: "3.9"


services:
  
  api:
    # Target Dockerfile in backend folder
    build: ./backend
   
    # Map port 8000 host to 8000 container
    ports:
      - "8000:8000"
    
    # folder mapping for changes to code
    volumes:
      - ./backend:/app
      - /app/node_modules

    networks:
      minglemap-net:
        ipv4_address: 172.25.0.10

networks:
  minglemap-net:
    external: true

